name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://imobiliario-nu.vercel.app/
            https://imobiliario-nu.vercel.app/imoveis
            https://imobiliario-nu.vercel.app/auth/signin
          configPath: ./lighthouserc.json
