name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check for lockfile changes
        run: |
          if [ -f "package-lock.json" ]; then
            echo "Lockfile exists - checking for changes..."
            git diff --name-only HEAD~1 HEAD | grep -q "package-lock.json" && echo "⚠️ Lockfile changed" || echo "✅ Lockfile unchanged"
          fi

      - name: Verify all components exist
        run: |
          echo "Checking shadcn components..."
          COMPONENTS_DIR="components/ui"
          EXPECTED_COUNT=60
          ACTUAL_COUNT=$(ls -1 "$COMPONENTS_DIR"/*.tsx 2>/dev/null | wc -l)
          if [ "$ACTUAL_COUNT" -lt "$EXPECTED_COUNT" ]; then
            echo "⚠️ Expected at least $EXPECTED_COUNT components, found $ACTUAL_COUNT"
            ls "$COMPONENTS_DIR"/*.tsx
          else
            echo "✅ Found $ACTUAL_COUNT components"
          fi
